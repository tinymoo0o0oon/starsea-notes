<script>
(function(){
  var KEY='starsea_unlocked_v1';
  var HASH='19e05df6b2e5fb94f3ee7eed2c02d340a1128a00231f5f6949641a143ab3b57a';
  var gate=document.getElementById('gate');
  function open(){gate.style.opacity='0';setTimeout(function(){gate.style.display='none';},520);}
  if(localStorage.getItem(KEY)==='1'){gate.style.display='none';return;}
  var inp=document.getElementById('gatein'),btn=document.getElementById('gatebtn'),err=document.getElementById('gateerr');
  async function sha256(s){var b=new TextEncoder().encode(s);var h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}
  async function check(){
    var v=(inp.value||'').trim();
    if(!v)return;
    var h=await sha256(v);
    if(h===HASH){localStorage.setItem(KEY,'1');open();}
    else{err.style.opacity='1';inp.value='';inp.focus();}
  }
  btn.addEventListener('click',check);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  inp.addEventListener('input',function(){err.style.opacity='0';});
  setTimeout(function(){inp.focus();},200);
})();
</script>

/* — 存储层:IndexedDB — */
var DB=null, DB_NAME='starsea', STORE='notes';
function dbOpen(){return new Promise(function(res,rej){var r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});};r.onsuccess=function(){DB=r.result;res(DB);};r.onerror=function(){rej(r.error);};});}
function dbAll(){return new Promise(function(res,rej){var tx=DB.transaction(STORE,'readonly'),st=tx.objectStore(STORE),out=[];st.openCursor().onsuccess=function(e){var c=e.target.result;if(c){out.push(c.value);c.continue();}else res(out);};tx.onerror=function(){rej(tx.error);};});}

var _embedder=null,_embedLoading=null;
function loadEmbedder(){
 if(_embedder)return Promise.resolve(_embedder);

 _embedLoading=import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2').then(function(mod){

function draw(now){

 cam.x+=(cam.tx-cam.x)*.07;cam.y+=(cam.ty-cam.y)*.07;cam.zoom+=(cam.tz-cam.zoom)*.07;

 var dimGlobal=birth?birth.dim:0;
 var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0c0814');g.addColorStop(1,'#0a0710');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 if(dimGlobal>0){ctx.globalAlpha=dimGlobal*.82;ctx.fillStyle='#06040a';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
 blooms.forEach(function(b){var p=w2s(b.x,b.y);var rg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,b.r*cam.zoom);rg.addColorStop(0,'rgba('+b.c+',.10)');rg.addColorStop(1,'rgba('+b.c+',0)');ctx.fillStyle=rg;ctx.globalAlpha=1-dimGlobal*.7;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;});
 dust.forEach(function(d){var dx=Math.sin(t*.3+d.r*9)*6,dy=Math.cos(t*.25+d.x)*5;var wx=d.x+dx,wy=d.y+dy;if(birth&&birth.phase==='gather'){var k=ease(birth.p);wx=d.x+(birth.x-d.x)*k*.96;wy=d.y+(birth.y-d.y)*k*.96;}var pp=w2s(wx,wy);var tw=.5+.5*Math.sin(t*1.5+d.x);ctx.globalAlpha=d.a*tw*(1-dimGlobal*.3);ctx.fillStyle='#fff3d6';ctx.beginPath();ctx.arc(pp.x,pp.y,d.r,0,6.28);ctx.fill();});
 ctx.globalAlpha=1;
 var act=selected;
 links.forEach(function(l){var a=stars[l[0]],b=stars[l[1]];if(!a||!b)return;var pa=w2s(a.x,a.y),pb=w2s(b.x,b.y);var on=act>=0&&(l[0]===act||l[1]===act);ctx.globalAlpha=Math.min(a.born,b.born)*(1-dimGlobal*.6);ctx.strokeStyle=on?'rgba(255,205,130,.5)':'rgba(255,180,110,.10)';ctx.lineWidth=on?1.3:.7;ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);ctx.stroke();var fl=(t*.35+(l[0]*7+l[1])*.13)%1;var fx=pa.x+(pb.x-pa.x)*fl,fy=pa.y+(pb.y-pa.y)*fl;ctx.globalAlpha=(on?.9:.35)*Math.min(a.born,b.born)*(1-dimGlobal*.6);ctx.fillStyle='#ffe7b0';ctx.beginPath();ctx.arc(fx,fy,on?2:1.3,0,6.28);ctx.fill();ctx.globalAlpha=1;});
 if(birth&&birth.drawLinks){var bc=w2s(birth.x,birth.y);birth.targets.forEach(function(tg,i){var st=stars[tg];var pp=w2s(st.x,st.y);var prog=Math.max(0,Math.min(1,(birth.linkP-i*.34)/.55));if(prog<=0)return;var ex=bc.x+(pp.x-bc.x)*prog,ey=bc.y+(pp.y-bc.y)*prog;ctx.globalAlpha=.75;ctx.strokeStyle='rgba(255,215,150,.9)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bc.x,bc.y);ctx.lineTo(ex,ey);ctx.stroke();ctx.fillStyle='#fff0c8';ctx.beginPath();ctx.arc(ex,ey,2.4,0,6.28);ctx.fill();ctx.globalAlpha=1;if(prog>=1&&!birth.lit[i]){birth.lit[i]=true;st.flash=1;piano(noteScale[Math.min(i,noteScale.length-1)],.18);}});}

 var drawn=[];
 stars.forEach(function(s){if(birth&&birth.star===s&&birth.phase!=='settle'&&birth.phase!=='link')return;
  var sw=Math.sin(t*s.damp*.1+s.ph)*7,sv=Math.cos(t*s.damp*.08+s.ph)*6;var wx=s.x+sw,wy=s.y+sv;
  if(birth&&birth.wave>0&&birth.star!==s){var ddx=s.x-birth.x,ddy=s.y-birth.y,dd=Math.sqrt(ddx*ddx+ddy*ddy)||1;var push=birth.wave*60/Math.max(60,dd);wx+=ddx/dd*push;wy+=ddy/dd*push;}
  var p=w2s(wx,wy);var tw=.7+.3*Math.sin(t*2+s.ph);if(s.flash>0)s.flash=Math.max(0,s.flash-.02);
  var sel=s.id===act;var dim=act>=0&&!sel&&nbr[act].indexOf(s.id)<0?.3:1;dim*=(1-dimGlobal*.7);
  var rr=s.r*cam.zoom*(sel?1.6:1)*(1+s.flash*.6);
  var glow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr*5);glow.addColorStop(0,s.col);glow.addColorStop(.25,s.col);glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=Math.min(1,(sel?.95:.5)*tw*dim+s.flash);ctx.fillStyle=glow;ctx.beginPath();ctx.arc(p.x,p.y,rr*5,0,6.28);ctx.fill();
  ctx.globalAlpha=Math.min(1,dim+s.flash);ctx.fillStyle='#fff7e2';ctx.beginPath();ctx.arc(p.x,p.y,rr,0,6.28);ctx.fill();
  if(sel){ctx.globalAlpha=.5+.3*Math.sin(t*4);ctx.strokeStyle='rgba(255,230,180,.8)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(p.x,p.y,rr+5,0,6.28);ctx.stroke();ctx.globalAlpha=1;}
  s._sx=p.x;s._sy=p.y;s._sr=rr;s._dim=dim;drawn.push(s);});
 ctx.globalAlpha=1;ctx.font='12px -apple-system,sans-serif';ctx.textAlign='center';
 var placed=[];drawn.sort(function(a,b){var pa=(a.id===act?3:0)+(act>=0&&nbr[act].indexOf(a.id)>=0?2:0);var pb=(b.id===act?3:0)+(act>=0&&nbr[act].indexOf(b.id)>=0?2:0);return pb-pa;});
 drawn.forEach(function(s){var prio=(s.id===act)||(act>=0&&nbr[act].indexOf(s.id)>=0);if(cam.zoom<=.5&&!prio)return;var lx2=s._sx,ly2=s._sy+s._sr+15,ok=true;for(var i=0;i<placed.length;i++){if(Math.abs(placed[i].x-lx2)<46&&Math.abs(placed[i].y-ly2)<14){ok=false;break;}}if(!ok&&!prio)return;ctx.globalAlpha=Math.min(1,(cam.zoom-.3)*2)*s._dim*(prio?1:.85);ctx.fillStyle='#ffe9bd';ctx.fillText(s.label,lx2,ly2);placed.push({x:lx2,y:ly2});});
 ctx.globalAlpha=1;
 if(birth)stepBirth(t);
 if(diving){dive+=.045;var s=diveTarget;var p=w2s(s.x,s.y);ctx.globalAlpha=Math.min(1,dive*1.2);ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(W,H)*dive*1.4,0,6.28);ctx.fill();ctx.globalAlpha=1;cam.tx=s.x;cam.ty=s.y;cam.tz=cam.tz*1.04+0.06;cam.zoom=cam.tz;if(dive>=1){diving=false;enterSurface(s);}}

}
requestAnimationFrame(draw);

function stepBirth(t){
 var b=birth,c=w2s(b.x,b.y);
 if(b.phase==='gather'){b.p+=.008;b.dim=Math.min(.9,b.p*1.3);var cr=8+ease(b.p)*22;var cg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,cr);cg.addColorStop(0,'rgba(255,240,200,'+(.5+b.p*.5)+')');cg.addColorStop(1,'rgba(255,200,120,0)');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(c.x,c.y,cr,0,6.28);ctx.fill();if(b.p>=1){b.phase='ignite';b.p=0;}}
 else if(b.phase==='ignite'){b.p+=.018;var k=ease(Math.min(1,b.p));var R=Math.max(W,H)*(.12+k*.9);var ig=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,R);ig.addColorStop(0,'rgba(255,255,245,'+(.95*(1-k*.3))+')');ig.addColorStop(.18,'rgba(255,225,160,'+(.9*(1-k*.4))+')');ig.addColorStop(.5,'rgba(255,150,90,'+(.5*(1-k))+')');ig.addColorStop(1,'rgba(255,120,80,0)');ctx.fillStyle=ig;ctx.beginPath();ctx.arc(c.x,c.y,R,0,6.28);ctx.fill();ctx.globalAlpha=(1-k)*.8;ctx.strokeStyle='rgba(255,230,180,.9)';ctx.lineWidth=3*(1-k)+1;ctx.beginPath();ctx.arc(c.x,c.y,R*.7,0,6.28);ctx.stroke();ctx.globalAlpha=1;b.wave=Math.max(0,(1-b.p)*1.0);if(b.p>=1){b.phase='name';b.p=0;b.wave=0;bTitle.textContent=b.star.label;bTitle.style.opacity=1;bSub.textContent='一颗新星诞生';bSub.style.opacity=.85;}}
 else if(b.phase==='name'){b.p+=.012;var pr=40+Math.sin(t*2)*6;var pg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,pr);pg.addColorStop(0,'rgba(255,248,225,.95)');pg.addColorStop(.4,'rgba(255,210,150,.7)');pg.addColorStop(1,'rgba(255,180,110,0)');ctx.fillStyle=pg;ctx.beginPath();ctx.arc(c.x,c.y,pr,0,6.28);ctx.fill();if(b.p>=1){b.phase='link';b.p=0;b.linkP=0;b.drawLinks=true;b.star.born=1;bTitle.style.opacity=0;bSub.style.opacity=0;selectStar(b.star.id,true);}}
 else if(b.phase==='link'){b.linkP+=.016;var pr2=22+Math.sin(t*3)*4;var pg2=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,pr2);pg2.addColorStop(0,'rgba(255,248,225,.9)');pg2.addColorStop(1,'rgba(255,180,110,0)');ctx.fillStyle=pg2;ctx.beginPath();ctx.arc(c.x,c.y,pr2,0,6.28);ctx.fill();if(b.linkP>=b.targets.length*.34+.7){b.phase='settle';b.p=0;}}

}

function pick(mx,my){var best=-1,bd=1e9;stars.forEach(function(s){if(s._sx==null)return;var dx=s._sx-mx,dy=s._sy-my;var d=dx*dx+dy*dy;var hit=Math.max(20,s._sr+16);if(d<hit*hit&&d<bd){bd=d;best=s.id;}});return best;}

function selectStar(id,tagBorn){selected=id;var s=stars[id];cardtag.textContent=tagBorn?'已为你连接':'已选中';cardtitle.textContent=s.label;cardlinks.innerHTML='';
 var ns=nbr[id];if(ns.length===0){var el=document.createElement('div');el.textContent='还没有连接';el.style.cssText='font-size:11px;color:#8a6a4a;';cardlinks.appendChild(el);}
 ns.slice(0,5).forEach(function(n){var el=document.createElement('div');el.textContent='→ '+stars[n].label;el.style.cssText='font-size:12px;color:#ffd9a0;cursor:pointer;line-height:1.35;';el.onclick=function(ev){ev.stopPropagation();selectStar(n,false);};cardlinks.appendChild(el);});
 cardjump.onclick=function(ev){ev.stopPropagation();startDive(id);};
 card.style.opacity=1;card.style.transform='translateY(0)';card.style.pointerEvents='auto';hint.style.opacity=0;}
function deselect(){selected=-1;card.style.opacity=0;card.style.transform='translateY(8px)';card.style.pointerEvents='none';}

var palettes={dusk:{sky:['#3a1f4d','#b5587a','#ff9e6b'],ground:'#2a1530',accent:'#ffd9a0',text:'#fff0e0',sun:1},snow:{sky:['#16314f','#3f6b94','#9fc5e0'],ground:'#cfe2f0',accent:'#7fa8c8',text:'#16314f',sun:1},bloom:{sky:['#5a2a52','#c25b8e','#ffc2d8'],ground:'#3a1c38',accent:'#ffd6e6',text:'#fff0f6',sun:0},ocean:{sky:['#062b3a','#0d5e6e','#3fb4ab'],ground:'#04222e',accent:'#bdeee6',text:'#e8fbf7',sun:0},ember:{sky:['#2a0f10','#7a2418','#e0632a'],ground:'#1c0a0a',accent:'#ffc98a',text:'#ffe7d6',sun:1}};
var surfAnim=null;
function paintSurface(s){var P=palettes[s.scene],t=(performance.now()-t0)/1000;var g=lctx.createLinearGradient(0,0,0,H);g.addColorStop(0,P.sky[0]);g.addColorStop(.55,P.sky[1]);g.addColorStop(.8,P.sky[2]);lctx.fillStyle=g;lctx.fillRect(0,0,W,H);for(var i=0;i<60;i++){var st=(i*89)%W,sy2=(i*53)%(H*.5);lctx.globalAlpha=.3+.3*Math.sin(t*1.5+i);lctx.fillStyle='#fff';lctx.fillRect(st,sy2,1,1);}lctx.globalAlpha=1;if(P.sun){var sx=W*.74,sy=H*.3;var sg=lctx.createRadialGradient(sx,sy,0,sx,sy,80);sg.addColorStop(0,'rgba(255,250,230,.95)');sg.addColorStop(1,'rgba(255,250,230,0)');lctx.fillStyle=sg;lctx.beginPath();lctx.arc(sx,sy,80,0,6.28);lctx.fill();}var hy=H*.6;lctx.fillStyle=P.ground;lctx.beginPath();lctx.moveTo(0,hy);for(var x=0;x<=W;x+=20){lctx.lineTo(x,hy+Math.sin(x*.018+s.ph)*10+Math.sin(x*.05)*4);}lctx.lineTo(W,H);lctx.lineTo(0,H);lctx.closePath();lctx.fill();for(var j=0;j<44;j++){var fx=((j*53+t*9*(j%2?1:-1))%W+W)%W;var fy=hy-18-((j*37)%Math.floor(H*.4));lctx.globalAlpha=.35+.45*Math.sin(t*2+j);lctx.fillStyle=P.accent;lctx.beginPath();lctx.arc(fx,fy,1.4,0,6.28);lctx.fill();}lctx.globalAlpha=1;if(mode==='surface')surfAnim=requestAnimationFrame(function(){paintSurface(s);});}
function enterSurface(s){mode='surface';deselect();var P=palettes[s.scene];ntitle.textContent=s.label;ntitle.style.color=P.text;
 var bd=s.body||'';var nl=bd.indexOf('\n');var shown=nl>=0?bd.slice(nl+1).replace(/^\s+/,''):bd;ntext.textContent=shown;ntext.style.color=P.text;notebody.style.background='linear-gradient(to top, rgba(0,0,0,.5), rgba(0,0,0,0))';surface.style.opacity=1;surface.style.pointerEvents='auto';hint.style.opacity=0;addbar.style.opacity=0;addbar.style.pointerEvents='none';if(surfAnim)cancelAnimationFrame(surfAnim);paintSurface(s);}
function exitSurface(){mode='space';if(surfAnim)cancelAnimationFrame(surfAnim);surface.style.opacity=0;surface.style.pointerEvents='none';addbar.style.opacity=1;addbar.style.pointerEvents='auto';dive=0;cam.tz=.62;}
document.getElementById('back').addEventListener('click',exitSurface);
function startDive(id){deselect();diving=true;dive=0;diveTarget=stars[id];}

var drag=false,dragged=false,lx=0,ly=0;
function busy(){return mode!=='space'||birth;}
function down(e){initAudio();if(busy())return;var p=relPos(e);drag=true;dragged=false;lx=p.x;ly=p.y;if(e.cancelable&&e.type.indexOf('touch')>=0)e.preventDefault();}
function move(e){if(mode!=='space')return;var p=relPos(e);if(drag){var dx=p.x-lx,dy=p.y-ly;if(Math.abs(dx)+Math.abs(dy)>4)dragged=true;cam.tx-=dx/cam.zoom;cam.ty-=dy/cam.zoom;cam.x-=dx/cam.zoom;cam.y-=dy/cam.zoom;lx=p.x;ly=p.y;}else{var h=pick(p.x,p.y);cv.style.cursor=h>=0?'pointer':'grab';}}
function up(e){if(busy()){drag=false;return;}if(drag&&!dragged){var p=relPos(e);var id=pick(p.x,p.y);if(id>=0){if(selected===id){startDive(id);}else{selectStar(id,false);}}else{deselect();}}drag=false;}
cv.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
cv.addEventListener('touchstart',function(e){down(e.touches[0]);},{passive:false});
window.addEventListener('touchmove',function(e){if(drag){move(e.touches[0]);if(e.cancelable)e.preventDefault();}},{passive:false});
window.addEventListener('touchend',function(e){up(e.changedTouches[0]);});
var pinchD=0;
cv.addEventListener('touchstart',function(e){if(e.touches.length===2){pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);drag=false;}},{passive:false});
cv.addEventListener('touchmove',function(e){if(e.touches.length===2&&mode==='space'&&!birth){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pinchD>0){cam.tz=Math.max(.32,Math.min(2.2,cam.tz*(d/pinchD)));cam.zoom=cam.tz;}pinchD=d;if(e.cancelable)e.preventDefault();}},{passive:false});
cv.addEventListener('wheel',function(e){if(busy())return;e.preventDefault();var p=relPos(e);var w=s2w(p.x,p.y);var f=Math.exp(-e.deltaY*.0012);cam.tz=Math.max(.32,Math.min(2.2,cam.tz*f));cam.zoom=cam.tz;var w2=s2w(p.x,p.y);cam.tx+=w.x-w2.x;cam.ty+=w.y-w2.y;cam.x=cam.tx;cam.y=cam.ty;},{passive:false});

var adding=false;
function birthStarFrom(txt){
 if(adding)return; adding=true; initAudio(); deselect();
 setStatus('正在理解这条想法…');
 embed(txt).then(function(v){return v;},function(){return null;}).then(function(vec){
  var conns=vec?connectTo(vec):[];
  var idx=stars.length, pos=placeNear(conns);
  var note={text:txt,vec:vec,conns:conns.map(function(i){return stars[i].dbId;}),x:pos.x,y:pos.y,created:Date.now()};
  return dbPut(note).then(function(d){return d;},function(){return idx;}).then(function(dbId){
   note.id=dbId; var s=makeStar(note,idx); s.born=0;
   stars.push(s); nbr[idx]=[];
   conns.forEach(function(j){links.push([idx,j]);nbr[idx].push(j);if(nbr[j].indexOf(idx)<0)nbr[j].push(idx);});
   if(vec){setStatus('');}else{setStatus('引擎没连上,这颗星先单独存下了');setTimeout(function(){setStatus('');},2600);}
   addbar.style.opacity=0;addbar.style.pointerEvents='none';hint.style.opacity=0;
   cam.tx=s.x;cam.ty=s.y;cam.tz=1.0;
   birth={star:s,x:s.x,y:s.y,phase:'gather',p:0,dim:0,wave:0,targets:conns,linkP:0,drawLinks:false,lit:[]};
   adding=false; syncPush();
  });
 });
}
var noteEl=document.getElementById('newnote');
function growNote(){noteEl.style.height='auto';noteEl.style.height=Math.min(noteEl.scrollHeight+2,window.innerHeight*0.4)+'px';}
function submitNote(){var v=noteEl.value.trim();if(!v)return;birthStarFrom(v);noteEl.value='';growNote();noteEl.blur();}
noteEl.addEventListener('input',growNote);
document.getElementById('addbtn').addEventListener('click',submitNote);
noteEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();submitNote();}});
document.getElementById('exp').addEventListener('click',function(e){e.stopPropagation();exportNotes();});
})();
