<script>
(function(){
  var KEY='starsea_unlocked_v1';
  var HASH='19e05df6b2e5fb94f3ee7eed2c02d340a1128a00231f5f6949641a143ab3b57a';
  var gate=document.getElementById('gate');
  function open(){gate.style.opacity='0';setTimeout(function(){gate.style.display='none';},520);}
  if(localStorage.getItem(KEY)==='1'){gate.style.display='none';return;}
  var inp=document.getElementById('gatein'),btn=document.getElementById('gatebtn'),err=document.getElementById('gateerr');
  async function sha256(s){var b=new TextEncoder().encode(s);var h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}
  async function check(){
    var v=(inp.value||'').trim();
    if(!v)return;
    var h=await sha256(v);
    if(h===HASH){localStorage.setItem(KEY,'1');open();}
    else{err.style.opacity='1';inp.value='';inp.focus();}
  }
  btn.addEventListener('click',check);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  inp.addEventListener('input',function(){err.style.opacity='0';});
  setTimeout(function(){inp.focus();},200);
})();

 else if(b.phase==='settle'){b.p+=.013;b.dim=Math.max(0,.9*(1-b.p));var sr=22*(1-ease(b.p))+b.star.r*cam.zoom*ease(b.p);var sg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,Math.max(sr,1)*4);sg.addColorStop(0,b.star.col);sg.addColorStop(.3,b.star.col);sg.addColorStop(1,'rgba(0,0,0,0)');ctx.globalAlpha=(1-b.p)*.8;ctx.fillStyle=sg;ctx.beginPath();ctx.arc(c.x,c.y,Math.max(sr,1)*4,0,6.28);ctx.fill();ctx.globalAlpha=1;if(b.p>=1){birth=null;if(birthQ.length){pumpBirth();}else{addbar.style.opacity=1;addbar.style.pointerEvents='auto';}}}
}

function pick(mx,my){var best=-1,bd=1e9;stars.forEach(function(s){if(s._sx==null)return;var dx=s._sx-mx,dy=s._sy-my;var d=dx*dx+dy*dy;var hit=Math.max(20,s._sr+16);if(d<hit*hit&&d<bd){bd=d;best=s.id;}});return best;}

function selectStar(id,tagBorn){selected=id;var s=stars[id];cardtag.textContent=tagBorn?'已为你连接':'已选中';cardtitle.textContent=s.label;cardlinks.innerHTML='';
 var ns=nbr[id];if(ns.length===0){var el=document.createElement('div');el.textContent='还没有连接';el.style.cssText='font-size:11px;color:#8a6a4a;';cardlinks.appendChild(el);}
 ns.slice(0,5).forEach(function(n){var el=document.createElement('div');el.textContent='→ '+stars[n].label;el.style.cssText='font-size:12px;color:#ffd9a0;cursor:pointer;line-height:1.35;';el.onclick=function(ev){ev.stopPropagation();selectStar(n,false);};cardlinks.appendChild(el);});
 cardjump.onclick=function(ev){ev.stopPropagation();startDive(id);};
 card.style.opacity=1;card.style.transform='translateY(0)';card.style.pointerEvents='auto';hint.style.opacity=0;}
function deselect(){selected=-1;card.style.opacity=0;card.style.transform='translateY(8px)';card.style.pointerEvents='none';}

var palettes={dusk:{sky:['#3a1f4d','#b5587a','#ff9e6b'],ground:'#2a1530',accent:'#ffd9a0',text:'#fff0e0',sun:1},snow:{sky:['#16314f','#3f6b94','#9fc5e0'],ground:'#cfe2f0',accent:'#7fa8c8',text:'#16314f',sun:1},bloom:{sky:['#5a2a52','#c25b8e','#ffc2d8'],ground:'#3a1c38',accent:'#ffd6e6',text:'#fff0f6',sun:0},ocean:{sky:['#062b3a','#0d5e6e','#3fb4ab'],ground:'#04222e',accent:'#bdeee6',text:'#e8fbf7',sun:0},ember:{sky:['#2a0f10','#7a2418','#e0632a'],ground:'#1c0a0a',accent:'#ffc98a',text:'#ffe7d6',sun:1}};
var surfAnim=null;
function paintSurface(s){var P=palettes[s.scene],t=(performance.now()-t0)/1000;var g=lctx.createLinearGradient(0,0,0,H);g.addColorStop(0,P.sky[0]);g.addColorStop(.55,P.sky[1]);g.addColorStop(.8,P.sky[2]);lctx.fillStyle=g;lctx.fillRect(0,0,W,H);for(var i=0;i<60;i++){var st=(i*89)%W,sy2=(i*53)%(H*.5);lctx.globalAlpha=.3+.3*Math.sin(t*1.5+i);lctx.fillStyle='#fff';lctx.fillRect(st,sy2,1,1);}lctx.globalAlpha=1;if(P.sun){var sx=W*.74,sy=H*.3;var sg=lctx.createRadialGradient(sx,sy,0,sx,sy,80);sg.addColorStop(0,'rgba(255,250,230,.95)');sg.addColorStop(1,'rgba(255,250,230,0)');lctx.fillStyle=sg;lctx.beginPath();lctx.arc(sx,sy,80,0,6.28);lctx.fill();}var hy=H*.6;lctx.fillStyle=P.ground;lctx.beginPath();lctx.moveTo(0,hy);for(var x=0;x<=W;x+=20){lctx.lineTo(x,hy+Math.sin(x*.018+s.ph)*10+Math.sin(x*.05)*4);}lctx.lineTo(W,H);lctx.lineTo(0,H);lctx.closePath();lctx.fill();for(var j=0;j<44;j++){var fx=((j*53+t*9*(j%2?1:-1))%W+W)%W;var fy=hy-18-((j*37)%Math.floor(H*.4));lctx.globalAlpha=.35+.45*Math.sin(t*2+j);lctx.fillStyle=P.accent;lctx.beginPath();lctx.arc(fx,fy,1.4,0,6.28);lctx.fill();}lctx.globalAlpha=1;if(mode==='surface')surfAnim=requestAnimationFrame(function(){paintSurface(s);});}
var surfStar=null;
/* 小型 markdown 解析器(常用子集):标题/粗斜体/代码/链接/列表/引用/代码块/分隔线 */
function mdToHtml(src){
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function inline(s){return esc(s)
    .replace(/`([^`]+)`/g,function(_,c){return '<code>'+c+'</code>';})
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^\*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/_([^_\n]+)_/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');}
  var lines=(src||'').replace(/\r/g,'').split('\n'),out=[],i=0;
  function flushP(buf){if(buf.length)out.push('<p>'+buf.map(inline).join('<br>')+'</p>');}
  while(i<lines.length){var ln=lines[i];
    if(/^```/.test(ln)){var code=[];i++;while(i<lines.length&&!/^```/.test(lines[i])){code.push(lines[i]);i++;}i++;out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');continue;}
    var h=ln.match(/^(#{1,3})\s+(.*)$/);if(h){out.push('<h'+h[1].length+'>'+inline(h[2])+'</h'+h[1].length+'>');i++;continue;}
    if(/^\s*([-*])\s+/.test(ln)){var items=[];while(i<lines.length&&/^\s*([-*])\s+/.test(lines[i])){items.push('<li>'+inline(lines[i].replace(/^\s*[-*]\s+/,''))+'</li>');i++;}out.push('<ul>'+items.join('')+'</ul>');continue;}
    if(/^\s*\d+\.\s+/.test(ln)){var oi=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){oi.push('<li>'+inline(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>');i++;}out.push('<ol>'+oi.join('')+'</ol>');continue;}
    if(/^\s*>\s?/.test(ln)){var q=[];while(i<lines.length&&/^\s*>\s?/.test(lines[i])){q.push(lines[i].replace(/^\s*>\s?/,''));i++;}out.push('<blockquote>'+q.map(inline).join('<br>')+'</blockquote>');continue;}
    if(/^\s*(---|\*\*\*|___)\s*$/.test(ln)){out.push('<hr>');i++;continue;}
    if(/^\s*$/.test(ln)){i++;continue;}
    var para=[];while(i<lines.length&&!/^\s*$/.test(lines[i])&&!/^(#{1,3}\s|\s*[-*]\s|\s*\d+\.\s|\s*>|```)/.test(lines[i])){para.push(lines[i]);i++;}flushP(para);
  }
  return out.join('\n');
}
function showNote(s){
  var bd=s.body||'',nl=bd.indexOf('\n');
  var title=nl>=0?bd.slice(0,nl).trim():'';
  var body=nl>=0?bd.slice(nl+1).replace(/^\s+/,''):bd.trim();
  if(!body){body=title;title='';}            // 单行笔记:整句当作 solo 居中展示
  if(title){ntitle.style.display='';ndiv.style.display='';ntitle.textContent=title;ntext.className='md';ntext.innerHTML=mdToHtml(body);}
  else{ntitle.style.display='none';ndiv.style.display='none';ntext.className='solo';ntext.textContent=body;}
  layoutCard();
}
/* 内容超出 → 可滚(显横条+底部渐隐);内容没满 → 居中、无横条。点横条在默认高度↔全屏切换 */
function layoutCard(){function m(){var over=cardscroll.scrollHeight>cardscroll.clientHeight+1;notebody.classList.toggle('scrollable',over);}requestAnimationFrame(m);setTimeout(m,320);}
function topUtil(show){var ex=document.getElementById('exp');[sndbtn,ex].forEach(function(el){if(!el)return;el.style.opacity=show?'':'0';el.style.pointerEvents=show?'auto':'none';});}
function enterSurface(s){mode='surface';deselect();surfStar=s;notebody.classList.remove('full');cancelEdit();showNote(s);surface.style.opacity=1;surface.style.pointerEvents='auto';hint.style.opacity=0;addbar.style.opacity=0;addbar.style.pointerEvents='none';topUtil(false);if(surfAnim)cancelAnimationFrame(surfAnim);paintSurface(s);}
function exitSurface(){mode='space';surfStar=null;cancelEdit();topUtil(true);if(surfAnim)cancelAnimationFrame(surfAnim);surface.style.opacity=0;surface.style.pointerEvents='none';addbar.style.opacity=1;addbar.style.pointerEvents='auto';dive=0;cam.tz=.62;}
document.getElementById('back').addEventListener('click',exitSurface);
document.getElementById('grab').addEventListener('click',function(e){e.stopPropagation();notebody.classList.toggle('full');layoutCard();});
window.addEventListener('resize',function(){if(mode==='surface')layoutCard();});
/* — 编辑 / 删除(在落地阅读视图里)— */
var delArmed=false,delTimer=null;
function disarmDelete(){delArmed=false;if(delTimer){clearTimeout(delTimer);delTimer=null;}var b=document.getElementById('delbtn');if(b)b.textContent='删除';}
function cancelEdit(){var ne=document.getElementById('noteedit'),nv=document.getElementById('noteview');if(ne)ne.style.display='none';if(nv)nv.style.display='block';notebody.classList.remove('editing');disarmDelete();layoutCard();}
function startEdit(){if(!surfStar)return;disarmDelete();notebody.classList.add('editing');document.getElementById('noteview').style.display='none';var ne=document.getElementById('noteedit');ne.style.display='block';var ta=document.getElementById('editarea');ta.value=surfStar.body||'';ta.focus();}
function saveEdit(){var s=surfStar;if(!s)return;var txt=document.getElementById('editarea').value.trim();if(!txt||txt===s.body){cancelEdit();return;}setStatus('正在重新理解…');var i=stars.indexOf(s);embed(txt).then(function(v){return v;},function(){return null;}).then(function(vec){s.body=txt;s.label=makeTitle(txt);s.r=sizeForLen(txt);if(vec){s.vec=vec;s.conns=connectTo(vec,i).map(function(k){return stars[k].dbId;});}var rec={id:s.dbId,text:txt,vec:s.vec,conns:(s.conns||[]).slice(),x:s.x,y:s.y,created:s.created,source:s.source||null,srcId:s.srcId||null};return dbPut(rec).then(function(){rebuildGraph();relax(140);setStatus(vec?'':'引擎没连上,连接未更新');if(!vec)setTimeout(function(){setStatus('');},2600);cancelEdit();showNote(s);syncPush();},function(){setStatus('保存失败');setTimeout(function(){setStatus('');},2000);});});}
function armDelete(){if(!surfStar)return;if(!delArmed){delArmed=true;document.getElementById('delbtn').textContent='确认删除?';delTimer=setTimeout(disarmDelete,3000);return;}disarmDelete();doDelete();}
function doDelete(){var s=surfStar;if(!s)return;var d=s.dbId;dbDelete(d).then(function(){var i=stars.indexOf(s);if(i>=0)stars.splice(i,1);stars.forEach(function(st,idx){st.id=idx;st.conns=(st.conns||[]).filter(function(x){return x!==d;});});rebuildGraph();relax(160);persistPositions();exitSurface();if(!stars.length)hint.textContent='敲下第一个想法,点亮第一颗星';syncPush();},function(){setStatus('删除失败');setTimeout(function(){setStatus('');},2000);});}
document.getElementById('editbtn').addEventListener('click',function(e){e.stopPropagation();startEdit();});
document.getElementById('delbtn').addEventListener('click',function(e){e.stopPropagation();armDelete();});
document.getElementById('savebtn').addEventListener('click',function(e){e.stopPropagation();saveEdit();});
document.getElementById('cancelbtn').addEventListener('click',function(e){e.stopPropagation();cancelEdit();});
function startDive(id){deselect();diving=true;dive=0;diveTarget=stars[id];}

var drag=false,dragged=false,lx=0,ly=0;
function busy(){return mode!=='space'||birth;}
function down(e){initAudio();if(busy())return;var p=relPos(e);drag=true;dragged=false;lx=p.x;ly=p.y;if(e.cancelable&&e.type.indexOf('touch')>=0)e.preventDefault();}
function move(e){if(mode!=='space')return;var p=relPos(e);if(drag){var dx=p.x-lx,dy=p.y-ly;if(Math.abs(dx)+Math.abs(dy)>4)dragged=true;cam.tx-=dx/cam.zoom;cam.ty-=dy/cam.zoom;cam.x-=dx/cam.zoom;cam.y-=dy/cam.zoom;lx=p.x;ly=p.y;}else{var h=pick(p.x,p.y);cv.style.cursor=h>=0?'pointer':'grab';}}
function up(e){if(busy()){drag=false;return;}if(drag&&!dragged){var p=relPos(e);var id=pick(p.x,p.y);if(id>=0){if(selected===id){startDive(id);}else{selectStar(id,false);}}else{deselect();}}drag=false;}
cv.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
cv.addEventListener('touchstart',function(e){down(e.touches[0]);},{passive:false});
window.addEventListener('touchmove',function(e){if(drag){move(e.touches[0]);if(e.cancelable)e.preventDefault();}},{passive:false});
window.addEventListener('touchend',function(e){up(e.changedTouches[0]);});
var pinchD=0;
cv.addEventListener('touchstart',function(e){if(e.touches.length===2){pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);drag=false;}},{passive:false});
cv.addEventListener('touchmove',function(e){if(e.touches.length===2&&mode==='space'&&!birth){var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(pinchD>0){cam.tz=Math.max(.32,Math.min(2.2,cam.tz*(d/pinchD)));cam.zoom=cam.tz;}pinchD=d;if(e.cancelable)e.preventDefault();}},{passive:false});
cv.addEventListener('wheel',function(e){if(busy())return;e.preventDefault();var p=relPos(e);var w=s2w(p.x,p.y);var f=Math.exp(-e.deltaY*.0012);cam.tz=Math.max(.32,Math.min(2.2,cam.tz*f));cam.zoom=cam.tz;var w2=s2w(p.x,p.y);cam.tx+=w.x-w2.x;cam.ty+=w.y-w2.y;cam.x=cam.tx;cam.y=cam.ty;},{passive:false});

var adding=false;
function birthStarFrom(txt){
 if(adding)return; adding=true; initAudio(); deselect();
 setStatus('正在理解这条想法…');
 embed(txt).then(function(v){return v;},function(){return null;}).then(function(vec){
  var conns=vec?connectTo(vec):[];
  var idx=stars.length, pos=placeNear(conns);
  var note={text:txt,vec:vec,conns:conns.map(function(i){return stars[i].dbId;}),x:pos.x,y:pos.y,created:Date.now()};
  return dbPut(note).then(function(d){return d;},function(){return idx;}).then(function(dbId){
   note.id=dbId; var s=makeStar(note,idx); s.born=0;
   stars.push(s); nbr[idx]=[];
   rebuildGraph();relax(140);
   if(vec){setStatus('');}else{setStatus('引擎没连上,这颗星先单独存下了');setTimeout(function(){setStatus('');},2600);}
   addbar.style.opacity=0;addbar.style.pointerEvents='none';hint.style.opacity=0;
   cam.tx=s.x;cam.ty=s.y;cam.tz=1.0;
   birth={star:s,x:s.x,y:s.y,phase:'gather',p:0,dim:0,wave:0,targets:conns,linkP:0,drawLinks:false,lit:[]};
   adding=false; syncPush();
  });
 });
}
var noteEl=document.getElementById('newnote');
function growNote(){noteEl.style.height='auto';noteEl.style.height=Math.min(noteEl.scrollHeight+2,window.innerHeight*0.4)+'px';}
function submitNote(){var v=noteEl.value.trim();if(!v)return;birthStarFrom(v);noteEl.value='';growNote();noteEl.blur();}
noteEl.addEventListener('input',growNote);
document.getElementById('addbtn').addEventListener('click',submitNote);
noteEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();submitNote();}});
